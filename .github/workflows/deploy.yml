name: online course registration system

on:
  push:
    branches:
      - main

jobs:
  # ── Job 1: Run backend tests ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: npm install --prefix backend

      # Unit tests: fully isolated (Sinon-stubbed models), no MongoDB needed.
      # These are deterministic, so a failure here should fail the build.
      - name: Run backend unit tests
        run: npm run test:unit --prefix backend

      # Intentional-failure demo (unit): three tests designed to fail, proving the
      # unit suite catches incorrect behaviour (the unit counterpart to TC-32).
      # continue-on-error so the deliberate failures don't block the pipeline.
      - name: Run backend unit test failure demo
        run: npm run test:unit:demo --prefix backend
        continue-on-error: true

      # Integration tests: fire real HTTP requests against the Express app and a
      # live MongoDB Atlas connection. Kept as continue-on-error because the
      # suite intentionally includes one failing assertion (TC-32) to prove the
      # tests catch incorrect behaviour.
      - name: Run backend integration tests
        run: npm test --prefix backend
        continue-on-error: true
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  # ── Job 2: Build frontend ─────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Build React app
        run: CI=false npm run build --prefix frontend

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

  # ── Job 3: Deploy (runs ON the EC2 via self-hosted runner) ────────
  deploy:
    runs-on: self-hosted      # ← runs directly on your App EC2
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      # No SSH needed — we're already on the EC2!
      # Just copy files directly to the app directory
      - name: Copy backend files
        run: |
          rsync -av --delete \
            --exclude 'node_modules' \
            --exclude '.env' \
            ./backend/ \
            /home/ubuntu/app/backend/

      - name: Copy frontend build
        run: |
          rsync -av --delete \
            ./frontend/build/ \
            /home/ubuntu/app/frontend/build/

      - name: Write .env file
        run: |
          cat > /home/ubuntu/app/backend/.env << EOF
          MONGO_URI=${{ secrets.MONGO_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          PORT=5001
          EOF

      - name: Install backend dependencies
        run: |
          cd /home/ubuntu/app/backend
          npm install --omit=dev

      - name: Restart backend with PM2
        run: |
          unset RUNNER_TRACKING_ID
          pm2 restart mern-backend 2>/dev/null || \
            pm2 start /home/ubuntu/app/backend/server.js --name mern-backend
          pm2 save

      - name: Reload Nginx
        run: sudo systemctl reload nginx
